name: 每日免费AI投资晨报

on:
  schedule:
    # UTC 23:41 = 北京时间次日07:41，为08:00前生成和部署预留时间。
    - cron: "41 23 * * *"
    # 补偿触发：GitHub 定时任务偶尔会延迟或漏跑，后两次用于自动兜底。
    - cron: "25 0 * * *"
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      regenerate_days:
        description: "重生成最近N天；0表示只补缺口，最多7天"
        required: false
        default: "0"
      max_reports:
        description: "本次最多生成几篇；1-3"
        required: false
        default: "2"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: investment-morning-report
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 读取项目
        uses: actions/checkout@v4

      - name: 准备 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 使用DeepSeek生成晨报
        env:
          AI_PROVIDER: deepseek
          AI_MODEL: ${{ vars.AI_MODEL || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REGENERATE_RECENT_DAYS: ${{ github.event.inputs.regenerate_days || '0' }}
          MAX_REPORTS_PER_RUN: ${{ github.event.inputs.max_reports || vars.MAX_REPORTS_PER_RUN || '2' }}
        run: python launcher/generate_free.py

      - name: 检查晨报文件
        run: python -c "import json; json.load(open('data/today.json', encoding='utf-8')); json.load(open('data/history.json', encoding='utf-8')); print('report files valid')"

      - name: 保存当前晨报和历史归档
        run: |
          git config user.name "morning-report-bot"
          git config user.email "morning-report-bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "晨报：自动更新"
          git push

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 打包在线阅读页面
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 发布在线阅读页面
        id: deployment
        uses: actions/deploy-pages@v4
